version: '3.8'

services:
  bazaar-app:
    container_name: bazaar_frontend
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    # سحب المتغيرات من ملف .env الموجود في نفس المجلد
    env_file:
      - .env
    ports:
      # البورت اليسار هو اللي بتفتحه بالـ VPS واليمين هو بورت التطبيق الداخلي
      - "${APP_PORT}:3000"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge